<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/createcss.css">
    <title>Formulario de Registro</title>
</head>
<body>
    <div class="center">
        <h1>Registrarse</h1>
        <form action="/register" method="POST">
            <!-- Nombre -->
            <div class="txt_field">
                <input type="text" name="username" id="username" required>
                <label for="username">Nombre de Usuario</label>
            </div>

            <!-- Email -->
            <div class="txt_field">
                <input type="email" name="email" id="email" required>
                <label for="email">Email</label>
            </div>

            <!-- Contraseña -->
            <div class="txt_field">
                <input type="password" name="password" id="password" required>
                <label for="password">Contraseña</label>
            </div>

            <!-- Repetir Contraseña -->
            <div class="txt_field">
                <input type="password" name="confirm_password" id="confirm_password" required>
                <label for="confirm_password">Repetir Contraseña</label>
            </div>

            <!-- Mensaje de error si las contraseñas no coinciden -->
            <div>
                <span th:if="${error}" style="color:red" th:text="${error}"></span>
                <span th:if="${mensajeError}" style="color:red" th:text="${mensajeError}"></span>
            </div>

            <!-- Mensaje de éxito -->
            <div>
                <span th:if="${success}" style="color:green" th:text="${success}"></span>
            </div>

            <input type="submit" value="Registrarse">
        </form>

        <div class="signup_link">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
        </div>
    </div>
</body>
</html>
